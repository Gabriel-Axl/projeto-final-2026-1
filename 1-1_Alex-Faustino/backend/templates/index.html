<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <title>Churn Prediction Agent</title>

    <link rel="stylesheet" href="/static/style.css">


</head>

<body>

<div class="container">

    <h1>Agente de Previsão de Churn</h1>

    <p>Previsão do risco de cancelamento de clientes e sugestões de ação para retenção.</p>

    <div id="loginArea">
        <h2>Login</h2>
        <label>Usuário</label>
        <input id="username" />
        <label>Senha</label>
        <input id="password" type="password" />
        <button id="loginBtn">Entrar</button>
        <div id="loginMsg"></div>
    </div>

    <div id="appArea" style="display:none;">
        <form id="predictForm"></form>

        <button id="predictBtn">
            Analisar Cliente
        </button>

        <span id="predictLoading">
            <span class="spinner" aria-hidden="true"></span>
            <span class="sr-only">Carregando...</span>
        </span>

        <button onclick="logout()" style="margin-left:10px;">Sair</button>

        <div id="result"></div>
    </div>

</div>

<script src="/static/script.js"></script>

</body>

</html>
